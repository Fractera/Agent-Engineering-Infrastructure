name: dark-contrast
label: Fractera Dark
description: shadcn/ui neutral dark — matches the Fractera admin panel palette

palette:
  background: "#252525"
  midground: "#fafafa"
  foreground: "#fafafa"

typography:
  fontSans: "system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
  fontMono: "ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
  baseSize: "14px"
  lineHeight: "1.55"
  letterSpacing: "0"

layout:
  radius: "0.625rem"
  density: "comfortable"

colorOverrides:
  card: "#353535"
  cardForeground: "#fafafa"
  popover: "#353535"
  popoverForeground: "#fafafa"
  primary: "#ebebeb"
  primaryForeground: "#353535"
  secondary: "#454545"
  secondaryForeground: "#fafafa"
  muted: "#454545"
  mutedForeground: "#b5b5b5"
  accent: "#454545"
  accentForeground: "#fafafa"
  destructive: "#dc2626"
  destructiveForeground: "#fafafa"
  border: "#ffffff1a"
  input: "#ffffff26"
  ring: "#8e8e8e"
